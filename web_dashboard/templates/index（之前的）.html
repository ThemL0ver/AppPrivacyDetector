<!--可视化预警系统-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP隐私权限检测与风险预警系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .risk-high { background-color: #ffebee; }
        .risk-medium { background-color: #fff3e0; }
        .risk-low { background-color: #e8f5e9; }
        .card { margin-bottom: 20px; }
        .permission-tag { margin: 2px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">APP隐私权限检测与风险预警系统</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>分析概览</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3">
                                <h3 id="total-analyzed">0</h3>
                                <p class="text-muted">总分析数量</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="high-risk" class="text-danger">0</h3>
                                <p class="text-muted">高风险应用</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="medium-risk" class="text-warning">0</h3>
                                <p class="text-muted">中风险应用</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="low-risk" class="text-success">0</h3>
                                <p class="text-muted">低风险应用</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>风险分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="riskChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>高频权限统计</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="permissionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>权限风险分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="permissionRiskChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>高风险权限列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>权限名称</th>
                                        <th>风险等级</th>
                                    </tr>
                                </thead>
                                <tbody id="high-risk-permissions">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>应用列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>APK文件</th>
                                        <th>包名</th>
                                        <th>风险等级</th>
                                        <th>风险评分</th>
                                        <th>权限总数</th>
                                        <th>危险权限数</th>
                                        <th>高风险权限数</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="app-table">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="appDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">应用详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="app-detail-content">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 确保Chart.js加载完成
        if (typeof Chart === 'undefined') {
            console.error('Chart.js 未加载');
        }
        
        let riskChart, permissionChart, permissionRiskChart;

        async function loadSummary() {
            try {
                const response = await fetch('/api/summary');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                document.getElementById('total-analyzed').textContent = data.total_analyzed || 0;
                document.getElementById('high-risk').textContent = data.high_risk || 0;
                document.getElementById('medium-risk').textContent = data.medium_risk || 0;
                document.getElementById('low-risk').textContent = data.low_risk || 0;
            } catch (error) {
                console.error('加载摘要数据失败:', error);
            }
        }
        
        async function loadRiskDistribution() {
            try {
                const response = await fetch('/api/permission-risks');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                
                // 确保数据结构正确
                const riskStats = data.risk_stats || { high: 0, medium: 0, low: 0, very_high: 0 };
                
                // 转换权限风险数据为应用风险分布格式
                const riskData = {
                    high_risk: (riskStats.high || 0) + (riskStats.very_high || 0),
                    medium_risk: riskStats.medium || 0,
                    low_risk: riskStats.low || 0
                };
                
                updateRiskChart(riskData);
            } catch (error) {
                console.error('加载风险分布数据失败:', error);
                // 使用默认数据
                updateRiskChart({ high_risk: 0, medium_risk: 0, low_risk: 0 });
            }
        }

        async function loadApps() {
            try {
                const response = await fetch('/api/apps');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const apps = await response.json() || [];
                
                const tbody = document.getElementById('app-table');
                tbody.innerHTML = '';
                
                apps.forEach(app => {
                    const row = document.createElement('tr');
                    row.className = `risk-${app.risk_level || 'low'}`;
                    row.innerHTML = `
                        <td>${app.apk_file || '未知'}</td>
                        <td>${app.package_name || '未知'}</td>
                        <td><span class="badge bg-${getRiskBadgeClass(app.risk_level || 'low')}">${app.risk_level || '低'}</span></td>
                        <td>${app.risk_score || 0}</td>
                        <td>${app.permissions_count || 0}</td>
                        <td>${app.dangerous_permissions || 0}</td>
                        <td>${app.high_risk_permissions || 0}</td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="showAppDetail('${app.package_name || 'unknown'}')">详情</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('加载应用列表失败:', error);
                const tbody = document.getElementById('app-table');
                tbody.innerHTML = '<tr><td colspan="8" class="text-center">加载应用列表失败</td></tr>';
            }
        }

        async function loadPermissions() {
            try {
                const response = await fetch('/api/permissions');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const permissions = await response.json() || [];
                
                updatePermissionChart(permissions);
            } catch (error) {
                console.error('加载权限统计失败:', error);
                updatePermissionChart([]);
            }
        }

        async function loadPermissionRisks() {
            try {
                const response = await fetch('/api/permission-risks');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json() || {};
                
                updatePermissionRiskChart(data.risk_stats || {});
                updateHighRiskPermissions(data.permission_details || []);
            } catch (error) {
                console.error('加载权限风险数据失败:', error);
                updatePermissionRiskChart({});
                updateHighRiskPermissions([]);
            }
        }

        function updateRiskChart(data) {
            try {
                const ctx = document.getElementById('riskChart');
                if (!ctx) {
                    console.error('riskChart canvas not found');
                    return;
                }
                
                const canvasContext = ctx.getContext('2d');
                if (!canvasContext) {
                    console.error('Cannot get canvas context');
                    return;
                }
                
                if (riskChart) {
                    riskChart.destroy();
                }
                
                // 确保数据不为空
                const highRisk = data.high_risk || 0;
                const mediumRisk = data.medium_risk || 0;
                const lowRisk = data.low_risk || 0;
                
                // 准备数据和标签
                const labels = [];
                const values = [];
                const colors = [];
                
                if (highRisk > 0) {
                    labels.push('高风险');
                    values.push(highRisk);
                    colors.push('#dc3545');
                }
                
                if (mediumRisk > 0) {
                    labels.push('中风险');
                    values.push(mediumRisk);
                    colors.push('#ffc107');
                }
                
                if (lowRisk > 0) {
                    labels.push('低风险');
                    values.push(lowRisk);
                    colors.push('#198754');
                }
                
                // 如果所有值都为0，添加默认数据
                if (values.length === 0) {
                    labels.push('无数据');
                    values.push(1);
                    colors.push('#6c757d');
                }
                
                riskChart = new Chart(canvasContext, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('更新风险图表失败:', error);
            }
        }

        function updatePermissionChart(permissions) {
            try {
                const ctx = document.getElementById('permissionChart');
                if (!ctx) {
                    console.error('permissionChart canvas not found');
                    return;
                }
                
                const canvasContext = ctx.getContext('2d');
                if (!canvasContext) {
                    console.error('Cannot get canvas context');
                    return;
                }
                
                if (permissionChart) {
                    permissionChart.destroy();
                }
                
                let labels = [];
                let data = [];
                
                if (permissions && permissions.length > 0) {
                    labels = permissions.map(p => p[0] ? p[0].split('.').pop() : '未知');
                    data = permissions.map(p => p[1] || 0);
                } else {
                    labels = ['无数据'];
                    data = [0];
                }
                
                permissionChart = new Chart(canvasContext, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: '使用次数',
                            data: data,
                            backgroundColor: '#0d6efd'
                        }]
                    },
                    options: {
                        responsive: true,
                        indexAxis: 'y',
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('更新权限图表失败:', error);
            }
        }

        function updatePermissionRiskChart(riskStats) {
            try {
                const ctx = document.getElementById('permissionRiskChart');
                if (!ctx) {
                    console.error('permissionRiskChart canvas not found');
                    return;
                }
                
                const canvasContext = ctx.getContext('2d');
                if (!canvasContext) {
                    console.error('Cannot get canvas context');
                    return;
                }
                
                if (permissionRiskChart) {
                    permissionRiskChart.destroy();
                }
                
                // 确保riskStats对象存在且有必要的属性
                const safeRiskStats = {
                    low: riskStats.low || 0,
                    medium: riskStats.medium || 0,
                    high: riskStats.high || 0,
                    very_high: riskStats.very_high || 0
                };
                
                permissionRiskChart = new Chart(canvasContext, {
                    type: 'bar',
                    data: {
                        labels: ['低风险', '中风险', '中高风险', '高风险'],
                        datasets: [{
                            label: '权限数量',
                            data: [safeRiskStats.low, safeRiskStats.medium, safeRiskStats.high, safeRiskStats.very_high],
                            backgroundColor: ['#198754', '#0d6efd', '#ffc107', '#dc3545']
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('更新权限风险图表失败:', error);
            }
        }

        function updateHighRiskPermissions(permissions) {
            try {
                const tbody = document.getElementById('high-risk-permissions');
                if (!tbody) {
                    console.error('high-risk-permissions table body not found');
                    return;
                }
                
                tbody.innerHTML = '';
                
                if (!permissions || permissions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" class="text-center">无高风险权限数据</td></tr>';
                    return;
                }
                
                // 过滤出中高、高、极高风险的权限
                const highRiskPerms = permissions.filter(p => 
                    p && (p.main_risk_level === '中高' || 
                    p.main_risk_level === '高' || 
                    p.main_risk_level === '极高')
                );
                
                if (highRiskPerms.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" class="text-center">无高风险权限</td></tr>';
                    return;
                }
                
                highRiskPerms.forEach(perm => {
                    if (perm && perm.name) {
                        const row = document.createElement('tr');
                        const badgeClass = getRiskBadgeClass(perm.main_risk_level || 'low');
                        row.innerHTML = `
                            <td>${perm.name.split('.').pop()}</td>
                            <td><span class="badge bg-${badgeClass}">${perm.risk_level || '未知'}</span></td>
                        `;
                        tbody.appendChild(row);
                    }
                });
            } catch (error) {
                console.error('更新高风险权限列表失败:', error);
            }
        }

        function getRiskBadgeClass(riskLevel) {
            switch(riskLevel) {
                case '低': return 'success';
                case '中': return 'primary';
                case '中高': return 'warning';
                case '高': return 'danger';
                case '极高': return 'danger';
                case 'high': return 'danger';
                case 'medium': return 'warning';
                case 'low': return 'success';
                default: return 'secondary';
            }
        }

        async function showAppDetail(packageName) {
            try {
                // 获取静态分析数据
                const response = await fetch(`/api/app/${packageName}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const app = await response.json();
                
                // 获取动态分析数据
                let dynamicAnalysis = null;
                try {
                    const dynamicResponse = await fetch(`/api/app/${packageName}/dynamic`);
                    if (dynamicResponse.ok) {
                        dynamicAnalysis = await dynamicResponse.json();
                    }
                } catch (dynamicError) {
                    console.error('获取动态分析数据失败:', dynamicError);
                }
                
                const content = document.getElementById('app-detail-content');
                if (!content) {
                    console.error('app-detail-content not found');
                    return;
                }
                
                // 构建权限详情HTML
                let permissionsHtml = '';
                if (app.static_analysis && app.static_analysis.permission_analysis && app.static_analysis.permission_analysis.permission_details) {
                    permissionsHtml = '<h6>权限详情</h6><div class="row">';
                    app.static_analysis.permission_analysis.permission_details.forEach(perm => {
                        const badgeClass = getRiskBadgeClass(perm.main_risk_level);
                        permissionsHtml += `
                            <div class="col-md-4 mb-2">
                                <span class="badge bg-${badgeClass}">${perm.risk_level}</span>
                                <span class="ms-2">${perm.name.split('.').pop()}</span>
                            </div>
                        `;
                    });
                    permissionsHtml += '</div>';
                }
                
                // 构建动态分析HTML
                let dynamicHtml = '';
                if (dynamicAnalysis) {
                    dynamicHtml = '<h6>动态分析</h6>';
                    
                    // 设备连接状态
                    dynamicHtml += `<p><strong>设备连接:</strong> ${dynamicAnalysis.device_connected ? '成功' : '失败'}</p>`;
                    
                    // APK安装状态
                    dynamicHtml += `<p><strong>APK安装:</strong> ${dynamicAnalysis.apk_installed ? '成功' : '失败'}</p>`;
                    
                    // 应用启动状态
                    dynamicHtml += `<p><strong>应用启动:</strong> ${dynamicAnalysis.app_started ? '成功' : '失败'}</p>`;
                    
                    // 用户交互状态
                    dynamicHtml += `<p><strong>用户交互:</strong> ${dynamicAnalysis.user_interactions ? '成功' : '失败'}</p>`;
                    
                    // 网络流量
                    if (dynamicAnalysis.network_traffic && dynamicAnalysis.network_traffic.length > 0) {
                        dynamicHtml += '<p><strong>网络连接:</strong></p>';
                        dynamicHtml += '<div class="bg-light p-2 rounded" style="max-height: 200px; overflow-y: auto;">';
                        dynamicAnalysis.network_traffic.forEach(traffic => {
                            dynamicHtml += `<p class="mb-1 text-sm">${traffic}</p>`;
                        });
                        dynamicHtml += '</div>';
                    }
                    
                    // Frida分析
                    if (dynamicAnalysis.frida_analysis) {
                        const frida = dynamicAnalysis.frida_analysis;
                        dynamicHtml += '<p><strong>Frida分析:</strong></p>';
                        dynamicHtml += `<p class="mb-1">总API调用: ${frida.summary ? frida.summary.total_api_calls : 0}</p>`;
                        dynamicHtml += `<p class="mb-1">总Hooked API: ${frida.summary ? frida.summary.total_hooked_apis : 0}</p>`;
                        dynamicHtml += `<p class="mb-1">分析时长: ${frida.summary ? frida.summary.duration.toFixed(2) : 0}秒</p>`;
                    }
                }
                
                content.innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <h6>基本信息</h6>
                            <p><strong>APK文件:</strong> ${app.apk_file || '未知'}</p>
                            <p><strong>包名:</strong> ${app.package_name || '未知'}</p>
                            <p><strong>风险等级:</strong> ${app.risk_assessment && app.risk_assessment.risk_level ? app.risk_assessment.risk_level : '未知'}</p>
                            <p><strong>风险评分:</strong> ${app.risk_assessment && app.risk_assessment.total_score ? app.risk_assessment.total_score : '0'}</p>
                        </div>
                        <div class="col-md-6">
                            <h6>权限分析</h6>
                            <p><strong>权限总数:</strong> ${app.static_analysis && app.static_analysis.total_permissions ? app.static_analysis.total_permissions : '0'}</p>
                            <p><strong>危险权限数:</strong> ${app.static_analysis && app.static_analysis.permission_analysis && app.static_analysis.permission_analysis.dangerous_permissions ? app.static_analysis.permission_analysis.dangerous_permissions.length : '0'}</p>
                            <p><strong>高风险权限数:</strong> ${app.static_analysis && app.static_analysis.permission_analysis && app.static_analysis.permission_analysis.high_risk_permissions ? app.static_analysis.permission_analysis.high_risk_permissions.length : '0'}</p>
                        </div>
                    </div>
                    <hr>
                    ${permissionsHtml}
                    ${dynamicHtml ? '<hr>' + dynamicHtml : ''}
                `;
                
                const modal = new bootstrap.Modal(document.getElementById('appDetailModal'));
                modal.show();
            } catch (error) {
                console.error('显示应用详情失败:', error);
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，开始加载数据...');
            loadSummary();
            loadRiskDistribution();
            loadApps();
            loadPermissions();
            loadPermissionRisks();
            console.log('数据加载完成');
        });
    </script>
</body>
</html>
