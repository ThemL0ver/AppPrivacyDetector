<!--可视化预警系统-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP隐私权限检测与风险预警系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .risk-high { background-color: #ffebee; }
        .risk-medium { background-color: #fff3e0; }
        .risk-low { background-color: #e8f5e9; }
        .card { margin-bottom: 20px; }
        .permission-tag { margin: 2px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">APP隐私权限检测与风险预警系统</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>分析概览</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col-md-3">
                                <h3 id="total-analyzed">0</h3>
                                <p class="text-muted">总分析数量</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="high-risk" class="text-danger">0</h3>
                                <p class="text-muted">高风险应用</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="medium-risk" class="text-warning">0</h3>
                                <p class="text-muted">中风险应用</p>
                            </div>
                            <div class="col-md-3">
                                <h3 id="low-risk" class="text-success">0</h3>
                                <p class="text-muted">低风险应用</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>风险分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="riskChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>高频权限统计</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="permissionChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>权限风险分布</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="permissionRiskChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>高风险权限列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>权限名称</th>
                                        <th>风险等级</th>
                                    </tr>
                                </thead>
                                <tbody id="high-risk-permissions">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>应用列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>APK文件</th>
                                        <th>包名</th>
                                        <th>风险等级</th>
                                        <th>风险评分</th>
                                        <th>权限总数</th>
                                        <th>危险权限数</th>
                                        <th>高风险权限数</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="app-table">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="appDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">应用详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="app-detail-content">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let riskChart, permissionChart, permissionRiskChart;

        async function loadSummary() {
            const response = await fetch('/api/summary');
            const data = await response.json();
            
            document.getElementById('total-analyzed').textContent = data.total_analyzed;
            document.getElementById('high-risk').textContent = data.high_risk;
            document.getElementById('medium-risk').textContent = data.medium_risk;
            document.getElementById('low-risk').textContent = data.low_risk;
        }
        
        async function loadRiskDistribution() {
            const response = await fetch('/api/permission-risks');
            const data = await response.json();
            
            // 转换权限风险数据为应用风险分布格式
            const riskData = {
                high_risk: data.risk_stats.high + data.risk_stats.very_high,
                medium_risk: data.risk_stats.medium,
                low_risk: data.risk_stats.low
            };
            
            updateRiskChart(riskData);
        }

        async function loadApps() {
            const response = await fetch('/api/apps');
            const apps = await response.json();
            
            const tbody = document.getElementById('app-table');
            tbody.innerHTML = '';
            
            apps.forEach(app => {
                const row = document.createElement('tr');
                row.className = `risk-${app.risk_level}`;
                row.innerHTML = `
                    <td>${app.apk_file}</td>
                    <td>${app.package_name}</td>
                    <td><span class="badge bg-${getRiskBadgeClass(app.risk_level)}">${app.risk_level}</span></td>
                    <td>${app.risk_score}</td>
                    <td>${app.permissions_count}</td>
                    <td>${app.dangerous_permissions}</td>
                    <td>${app.high_risk_permissions || 0}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="showAppDetail('${app.package_name}')">详情</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        async function loadPermissions() {
            const response = await fetch('/api/permissions');
            const permissions = await response.json();
            
            updatePermissionChart(permissions);
        }

        async function loadPermissionRisks() {
            const response = await fetch('/api/permission-risks');
            const data = await response.json();
            
            updatePermissionRiskChart(data.risk_stats);
            updateHighRiskPermissions(data.permission_details);
        }

        function updateRiskChart(data) {
            const ctx = document.getElementById('riskChart').getContext('2d');
            
            if (riskChart) {
                riskChart.destroy();
            }
            
            // 确保数据不为空
            const highRisk = data.high_risk || 0;
            const mediumRisk = data.medium_risk || 0;
            const lowRisk = data.low_risk || 0;
            
            // 准备数据和标签
            const labels = [];
            const values = [];
            const colors = [];
            
            if (highRisk > 0) {
                labels.push('高风险');
                values.push(highRisk);
                colors.push('#dc3545');
            }
            
            if (mediumRisk > 0) {
                labels.push('中风险');
                values.push(mediumRisk);
                colors.push('#ffc107');
            }
            
            if (lowRisk > 0) {
                labels.push('低风险');
                values.push(lowRisk);
                colors.push('#198754');
            }
            
            // 如果所有值都为0，添加默认数据
            if (values.length === 0) {
                labels.push('无数据');
                values.push(1);
                colors.push('#6c757d');
            }
            
            riskChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        function updatePermissionChart(permissions) {
            const ctx = document.getElementById('permissionChart').getContext('2d');
            
            if (permissionChart) {
                permissionChart.destroy();
            }
            
            const labels = permissions.map(p => p[0].split('.').pop());
            const data = permissions.map(p => p[1]);
            
            permissionChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '使用次数',
                        data: data,
                        backgroundColor: '#0d6efd'
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function updatePermissionRiskChart(riskStats) {
            const ctx = document.getElementById('permissionRiskChart').getContext('2d');
            
            if (permissionRiskChart) {
                permissionRiskChart.destroy();
            }
            
            permissionRiskChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['低风险', '中风险', '中高风险', '高风险'],
                    datasets: [{
                        label: '权限数量',
                        data: [riskStats.low, riskStats.medium, riskStats.high, riskStats.very_high],
                        backgroundColor: ['#198754', '#0d6efd', '#ffc107', '#dc3545']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
        }

        function updateHighRiskPermissions(permissions) {
            const tbody = document.getElementById('high-risk-permissions');
            tbody.innerHTML = '';
            
            // 过滤出中高、高、极高风险的权限
            const highRiskPerms = permissions.filter(p => 
                p.main_risk_level === '中高' || 
                p.main_risk_level === '高' || 
                p.main_risk_level === '极高'
            );
            
            highRiskPerms.forEach(perm => {
                const row = document.createElement('tr');
                const badgeClass = getRiskBadgeClass(perm.main_risk_level);
                row.innerHTML = `
                    <td>${perm.name.split('.').pop()}</td>
                    <td><span class="badge bg-${badgeClass}">${perm.risk_level}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        function getRiskBadgeClass(riskLevel) {
            switch(riskLevel) {
                case '低': return 'success';
                case '中': return 'primary';
                case '中高': return 'warning';
                case '高': return 'danger';
                case '极高': return 'danger';
                case 'high': return 'danger';
                case 'medium': return 'warning';
                case 'low': return 'success';
                default: return 'secondary';
            }
        }

        async function showAppDetail(packageName) {
            const response = await fetch(`/api/app/${packageName}`);
            const app = await response.json();
            
            const content = document.getElementById('app-detail-content');
            
            // 构建权限详情HTML
            let permissionsHtml = '';
            if (app.static_analysis.permission_analysis.permission_details) {
                permissionsHtml = '<h6>权限详情</h6><div class="row">';
                app.static_analysis.permission_analysis.permission_details.forEach(perm => {
                    const badgeClass = getRiskBadgeClass(perm.main_risk_level);
                    permissionsHtml += `
                        <div class="col-md-4 mb-2">
                            <span class="badge bg-${badgeClass}">${perm.risk_level}</span>
                            <span class="ms-2">${perm.name.split('.').pop()}</span>
                        </div>
                    `;
                });
                permissionsHtml += '</div>';
            }
            
            content.innerHTML = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>基本信息</h6>
                        <p><strong>APK文件:</strong> ${app.apk_file}</p>
                        <p><strong>包名:</strong> ${app.package_name}</p>
                        <p><strong>风险等级:</strong> ${app.risk_assessment.risk_level}</p>
                        <p><strong>风险评分:</strong> ${app.risk_assessment.total_score}</p>
                    </div>
                    <div class="col-md-6">
                        <h6>权限分析</h6>
                        <p><strong>权限总数:</strong> ${app.static_analysis.total_permissions}</p>
                        <p><strong>危险权限数:</strong> ${app.static_analysis.permission_analysis.dangerous_permissions.length}</p>
                        <p><strong>高风险权限数:</strong> ${app.static_analysis.permission_analysis.high_risk_permissions.length}</p>
                    </div>
                </div>
                <hr>
                ${permissionsHtml}
            `;
            
            const modal = new bootstrap.Modal(document.getElementById('appDetailModal'));
            modal.show();
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadSummary();
            loadRiskDistribution();
            loadApps();
            loadPermissions();
            loadPermissionRisks();
        });
    </script>
</body>
</html>
